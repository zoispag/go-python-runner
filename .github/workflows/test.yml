name: Test

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: E2E (${{ matrix.pm }})
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        pm: [uv, poetry, pipenv, pip]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install uv
        if: matrix.pm == 'uv'
        uses: astral-sh/setup-uv@v8

      - name: Install Poetry
        if: matrix.pm == 'poetry'
        uses: snok/install-poetry@v1
        with:
          virtualenvs-in-project: true

      - name: Install pipenv
        if: matrix.pm == 'pipenv'
        run: pip install pipenv

      - name: go build
        run: go build ./...

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test -v -timeout 120s ./python/ -run TestE2E
